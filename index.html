<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Absensi QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
    --primary:#2563eb;
    --success:#16a34a;
    --danger:#dc2626;
    --bg:#f3f4f6;
    --card:#ffffff;
}

body{
    font-family:Arial,sans-serif;
    background:var(--bg);
    padding:20px;
    margin:0;
}

.app-card{
    max-width:500px;
    margin:auto;
    background:var(--card);
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.12);
}

h2{
    text-align:center;
    color:var(--primary);
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-top:0;
    margin-bottom:20px;
}

#reader{
    width:100%;
    border:2px solid #e5e7eb;
    border-radius:15px;
    overflow:hidden;
}

#result{
    margin-top:20px;
}

.info{
    background:#f9fafb;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

.success{
    background:#ecfdf5;
    border:1px solid #16a34a;
    border-radius:12px;
    padding:15px;
    color:#166534;
    font-weight:bold;
}

.error{
    background:#fef2f2;
    border:1px solid #dc2626;
    border-radius:12px;
    padding:15px;
    color:#991b1b;
    font-weight:bold;
}

.employee-name{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    text-align:center;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.btn-in{
    background:var(--success);
    color:white;
}

.btn-out{
    background:var(--danger);
    color:white;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#999;
    font-size:12px;
}
#recentContainer{
    margin-top:20px;
    text-align:left;
}

#recentContainer h3{
    margin-bottom:10px;
    color:#333;
}

.recent-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    margin-bottom:8px;
    border-radius:10px;
    background:#f9fafb;
    border:1px solid #e5e7eb;
}

.recent-name{
    font-weight:bold;
}

.recent-time{
    color:#666;
    font-size:14px;
}

.status-in{
    color:#16a34a;
    font-weight:bold;
}

.status-out{
    color:#dc2626;
    font-weight:bold;
}

.empty{
    color:#999;
    text-align:center;
    padding:10px;
}
</style>
</head>
<body>
<div class="app-card">

<h2>QR Attendance</h2>

<p class="subtitle">
Fast • Simple • Reliable
</p>

<div id="reader"></div>

<div id="result" class="info">
    Ready to Scan
</div>

<div id="recentContainer">

    <h3>Recent Attendance</h3>

    <div id="recentAttendance">

        <div class="empty">
            No attendance yet
        </div>

    </div>
    
    <button onclick="clearRecentAttendance()">
        Clear History
    </button>

</div>


<div class="footer">
    QR Attendance v1.0
</div>

</div>

<script>

// ========================================
// APPS SCRIPT URL
// ========================================

const API_URL =
"https://script.google.com/macros/s/AKfycbwGdEaK_FZXxgx6KGDie-1v9NwwRnJS5MhI6X_tCbb2NOhMI-uwPuopbQyZQTwYkTLJ/exec";

// ========================================

let scanner = null;

let scanLocked = false;

let lastScan = "";
let lastScanTime = 0;
let recentScans =
    JSON.parse(
        localStorage.getItem("recentScans")
    ) || [];

// ========================================
// BEEP
// ========================================

function playBeep(){

    try{

        const ctx =
            new(window.AudioContext ||
            window.webkitAudioContext)();

        const osc =
            ctx.createOscillator();

        osc.frequency.value = 1000;

        osc.connect(ctx.destination);

        osc.start();

        setTimeout(()=>{
            osc.stop();
        },150);

    }catch(e){}

}

function renderRecentAttendance(){

    const container =
        document.getElementById(
            "recentAttendance"
        );

    if(recentScans.length === 0){

        container.innerHTML =
        `
        <div class="empty">
            No attendance yet
        </div>
        `;

        return;
    }

    container.innerHTML =
        recentScans.map(item =>

        `
        <div class="recent-item">

            <div>

                <div class="recent-name">
                    ${item.name}
                </div>

                <div class="recent-time">
                    ${item.time}
                </div>

            </div>

            <div class="
                ${item.status === 'IN'
                    ? 'status-in'
                    : 'status-out'}
            ">
                ${item.status === 'IN'
                    ? '🟢 IN'
                    : '🔴 OUT'}
            </div>

        </div>
        `

        ).join("");

}

function clearRecentAttendance(){

    localStorage.removeItem(
        "recentScans"
    );

    recentScans = [];

    renderRecentAttendance();

}

// ========================================
// START SCANNER
// ========================================

async function startScanner(){

    try{

        document.getElementById("reader").innerHTML = "";

        scanner = new Html5Qrcode("reader");

        await scanner.start(
            {
                facingMode:"environment"
            },
            {
                fps:10,
                qrbox:250
            },
            onScanSuccess
        );

    }catch(error){

        console.error(error);

        document.getElementById("result").innerHTML =
        `
        <div class="error">
            Gagal membuka kamera
        </div>
        `;

    }

}

// ========================================
// STOP SCANNER
// ========================================

async function stopScanner(){

    try{

        if(scanner){

            await scanner.stop();

            await scanner.clear();

        }

    }catch(error){

        console.log(error);

    }

}

// ========================================
// QR SUCCESS
// ========================================

async function onScanSuccess(decodedText){

    if(scanLocked){
        return;
    }

    const now = Date.now();

    if(
        decodedText === lastScan &&
        (now - lastScanTime) < 30000
    ){
        return;
    }

    scanLocked = true;

    lastScan = decodedText;
    lastScanTime = now;

    await stopScanner();

    const parts =
        decodedText.split("|");

    const employeeId =
        parts[0] || "";

    const name =
        parts[1] || "Unknown";

    document.getElementById("result").innerHTML = `
        <div class="employee-name">
            ${name}
        </div>

        <button
            class="btn btn-in"
            onclick="saveAttendance(
                '${employeeId}',
                '${name}',
                'IN'
            )">
            SHIFT IN
        </button>

        <button
            class="btn btn-out"
            onclick="saveAttendance(
                '${employeeId}',
                '${name}',
                'OUT'
            )">
            SHIFT OUT
        </button>
    `;

}

// ========================================
// SAVE
// ========================================

async function saveAttendance(
    employeeId,
    name,
    status
){

    const now = new Date();

    const payload = {

        employeeId: employeeId,
        name: name,
        date: now.toLocaleDateString("id-ID"),
        time: now.toLocaleTimeString("id-ID"),
        status: status

    };

    document.getElementById("result").innerHTML =
    `
    <div class="info">
        ⏳ Saving Attendance...
    </div>
    `;

    try{

        await fetch(
            API_URL,
            {
                method:"POST",
                mode:"no-cors",
                body:JSON.stringify(payload)
            }
        );

        playBeep();

        recentScans.unshift({

            name:name,

            time:payload.time,

            status:status

        });

        recentScans =
            recentScans.slice(0,5);

        localStorage.setItem(
            "recentScans",
            JSON.stringify(recentScans)
        );

        renderRecentAttendance();

        document.getElementById("result").innerHTML =
        `
        <div class="success">

            <h3>✅ Attendance Recorded</h3>

            <p>${name}</p>

            <p>Shift ${status}</p>

            <p>${payload.time}</p>

        </div>
        `;

    }
    catch(error){

        document.getElementById("result").innerHTML =
        `
        <div class="error">

            <h3>❌ Failed</h3>

            <p>Please try again</p>

        </div>
        `;

    }

    setTimeout(async()=>{

        scanLocked = false;

        document.getElementById("result").innerHTML =
        `
        <div class="info">
            Silakan scan QR Code
        </div>
        `;

        await startScanner();

    },3000);

}

// ========================================
// INIT
// ========================================

startScanner();

renderRecentAttendance();

</script>

</body>
</html>
