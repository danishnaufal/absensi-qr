<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Absensi QR</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {

            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;

            --bg: #f3f4f6;
            --card: #ffffff;

            --text: #111827;
            --text-secondary: #6b7280;

            --border: #e5e7eb;

            --recent-bg: #f9fafb;

        }

        body.dark {

            --bg: #111827;

            --card: #1f2937;

            --text: #f9fafb;

            --text-secondary: #9ca3af;

            --border: #374151;

            --recent-bg: #374151;

        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
        }

        .app-card {
            max-width: 500px;
            margin: auto;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .12);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 0;
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            overflow: hidden;
        }

        #result {
            margin-top: 20px;
        }

        .info {
            background: var(--recent-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background: #ecfdf5;
            border: 1px solid #16a34a;
            border-radius: 12px;
            padding: 15px;
            color: #166534;
            font-weight: bold;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 15px;
            color: #991b1b;
            font-weight: bold;
        }

        .employee-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .employee-card {
            text-align: center;
        }

        .employee-avatar {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .employee-id {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons .btn {
            flex: 1;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .btn-in {
            background: var(--success);
            color: white;
        }

        .btn-out {
            background: var(--danger);
            color: white;
        }

        .btn-clear {

            width: 100%;

            border: none;

            background: #374151;

            color: white;

            padding: 10px;

            border-radius: 10px;

            margin-top: 10px;

            cursor: pointer;

        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        #recentContainer {
            margin-top: 20px;
            text-align: left;
        }

        #recentContainer h3 {
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .recent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: var(--recent-bg);
            border: 1px solid var(--border);
        }

        .recent-name {
            font-weight: bold;
        }

        .recent-time {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .status-in {
            color: #16a34a;
            font-weight: bold;
        }

        .status-out {
            color: #dc2626;
            font-weight: bold;
        }

        .empty {
            color: #999;
            text-align: center;
            padding: 10px;
        }

        .theme-toggle {

            text-align: center;

            margin-bottom: 15px;

        }

        .btn-theme {

            border: none;

            background: #374151;

            color: white;

            padding: 8px 15px;

            border-radius: 10px;

            cursor: pointer;

        }
    </style>
</head>

<body>
    <div class="app-card">

        <h2>📋 Attendance Scanner</h2>

        <p class="subtitle">
            Scan • Record • Track
        </p>

        <div class="theme-toggle">

            <button id="themeBtn" class="btn-theme" onclick="toggleTheme()">

                🌙 Dark Mode

            </button>

        </div>

        <div id="reader"></div>

        <div id="result" class="info">
            Ready to Scan
        </div>

        <div id="recentContainer">

            <h3>Recent Attendance</h3>

            <div id="recentAttendance">

                <div class="empty">
                    No attendance yet
                </div>

            </div>

            <button class="btn-clear" onclick="clearRecentAttendance()">

                🗑 Clear History

            </button>

        </div>


        <div class="footer">
            QR Attendance v1.1
        </div>

    </div>

    <script>

        // ========================================
        // APPS SCRIPT URL
        // ========================================

        const API_URL =
            "https://script.google.com/macros/s/AKfycbwGdEaK_FZXxgx6KGDie-1v9NwwRnJS5MhI6X_tCbb2NOhMI-uwPuopbQyZQTwYkTLJ/exec";

        // ========================================

        let scanner = null;

        let scanLocked = false;

        let lastScan = "";
        let lastScanTime = 0;
        let recentScans =
            JSON.parse(
                localStorage.getItem("recentScans")
            ) || [];

        // ========================================
        // BEEP
        // ========================================

        function playBeep() {

            try {

                const ctx =
                    new (window.AudioContext ||
                        window.webkitAudioContext)();

                const osc =
                    ctx.createOscillator();

                osc.frequency.value = 1000;

                osc.connect(ctx.destination);

                osc.start();

                setTimeout(() => {
                    osc.stop();
                }, 150);

            } catch (e) { }

        }

        function renderRecentAttendance() {

            const container =
                document.getElementById(
                    "recentAttendance"
                );

            if (recentScans.length === 0) {

                container.innerHTML =
                    `
        <div class="empty">
            No attendance yet
        </div>
        `;

                return;
            }

            container.innerHTML =
                recentScans.map(item =>

                    `
        <div class="recent-item">

            <div>

                <div class="recent-name">
                    ${item.name}
                </div>

                <div class="recent-time">
                    ${item.time}
                </div>

            </div>

            <div class="
                ${item.status === 'IN'
                        ? 'status-in'
                        : 'status-out'}
            ">
                ${item.status === 'IN'
                        ? '🟢 IN'
                        : '🔴 OUT'}
            </div>

        </div>
        `

                ).join("");

        }

        function clearRecentAttendance() {

            localStorage.removeItem(
                "recentScans"
            );

            recentScans = [];

            renderRecentAttendance();

        }


        // ========================================
        // START SCANNER
        // ========================================

        async function startScanner() {

            try {

                document.getElementById("reader").innerHTML = "";

                scanner = new Html5Qrcode("reader");

                await scanner.start(
                    {
                        facingMode: "environment"
                    },
                    {
                        fps: 10,
                        qrbox: 250
                    },
                    onScanSuccess
                );

            } catch (error) {

                console.error(error);

                document.getElementById("result").innerHTML =
                    `
        <div class="error">
            Gagal membuka kamera
        </div>
        `;

            }

        }

        // ========================================
        // STOP SCANNER
        // ========================================

        async function stopScanner() {

            try {

                if (scanner) {

                    await scanner.stop();

                    await scanner.clear();

                }

            } catch (error) {

                console.log(error);

            }

        }

        // ========================================
        // QR SUCCESS
        // ========================================

        async function onScanSuccess(decodedText) {

            if (scanLocked) {
                return;
            }

            const now = Date.now();

            if (
                decodedText === lastScan &&
                (now - lastScanTime) < 30000
            ) {
                return;
            }

            scanLocked = true;

            lastScan = decodedText;
            lastScanTime = now;

            await stopScanner();

            const parts =
                decodedText.split("|");

            if (parts.length < 2) {

                document.getElementById("result").innerHTML =

                    `
    <div class="error">
        Invalid QR Code
    </div>
    `;

                scanLocked = false;

                await startScanner();

                return;
            }

            const employeeId =
                parts[0] || "";

            const name =
                parts[1] || "Unknown";

            document.getElementById("result").innerHTML = `

<div class="employee-card">

    <div class="employee-avatar">
        🪪
    </div>

    <div class="employee-name">
        ${name}
    </div>

    <div class="employee-id">
        ${employeeId}
    </div>

    <div class="action-buttons">

        <button
            class="btn btn-in"
            onclick="saveAttendance(
                '${employeeId}',
                '${name}',
                'IN'
            )">

            SHIFT IN

        </button>

        <button
            class="btn btn-out"
            onclick="saveAttendance(
                '${employeeId}',
                '${name}',
                'OUT'
            )">

            SHIFT OUT

        </button>

    </div>

</div>

`;

        }


        // ========================================
        // SAVE
        // ========================================

        async function saveAttendance(
            employeeId,
            name,
            status
        ) {

            const buttons =
                document.querySelectorAll(".btn");

            buttons.forEach(btn => {
                btn.disabled = true;
            });

            const now = new Date();

            const date =
                now.getFullYear() + "-" +
                String(now.getMonth() + 1).padStart(2, "0") + "-" +
                String(now.getDate()).padStart(2, "0");

            const time =
                String(now.getHours()).padStart(2, "0") + ":" +
                String(now.getMinutes()).padStart(2, "0") + ":" +
                String(now.getSeconds()).padStart(2, "0");


            const payload = {

                employeeId: employeeId,

                name: name,

                date: date,

                time: time,

                status: status

            };

            const controller =
                new AbortController();

            setTimeout(
                () => controller.abort(),
                10000
            );

            document.getElementById("result").innerHTML =
                `
                <div class="info">
                    ⏳ Saving Attendance...
                </div>
                `;

            try {

                const response =
                    await fetch(
                        API_URL,
                        {
                            method: "POST",
                            body: JSON.stringify(payload),
                            signal: controller.signal
                        }
                    );

                const result =
                    await response.json();

                if (!result.success) {

                    document.getElementById(
                        "result"
                    ).innerHTML =

                        `
            <div class="error">
                ⚠ ${result.message}
            </div>
            `;

                    setTimeout(async () => {

                        scanLocked = false;

                        document.getElementById(
                            "result"
                        ).innerHTML =
                            `
                <div class="info">
                    Ready to Scan
                </div>
                `;

                        await startScanner();

                    }, 3000);

                    return;

                }

                playBeep();

                recentScans.unshift({

                    name: name,

                    time: payload.time,

                    status: status

                });

                recentScans =
                    recentScans.slice(0, 5);

                localStorage.setItem(
                    "recentScans",
                    JSON.stringify(recentScans)
                );

                renderRecentAttendance();

                document.getElementById("result").innerHTML =
                    `
<div class="success">

    <h3>✅ Attendance Recorded</h3>

    <hr>

    <p><strong>${name}</strong></p>

    <p>${status}</p>

    <p>${payload.time}</p>

</div>
`;


            }
            catch (error) {

                document.getElementById("result").innerHTML =
                    `
        <div class="error">

            <h3>❌ Failed</h3>

            <p>Please try again</p>

        </div>
        `;

            }

            setTimeout(async () => {

                scanLocked = false;

                document.getElementById("result").innerHTML =
                    `
        <div class="info">
            Ready to scan
        </div>
        `;

                await startScanner();

            }, 3000);

        }

        function toggleTheme() {

            document.body.classList.toggle(
                "dark"
            );

            const isDark =
                document.body.classList.contains(
                    "dark"
                );

            localStorage.setItem(
                "theme",
                isDark
                    ? "dark"
                    : "light"
            );

            document.getElementById(
                "themeBtn"
            ).innerHTML =
                isDark
                    ? "☀️ Light Mode"
                    : "🌙 Dark Mode";

        }

        const savedTheme =
            localStorage.getItem(
                "theme"
            );

        if (savedTheme === "dark") {

            document.body.classList.add(
                "dark"
            );

            document.getElementById(
                "themeBtn"
            ).innerHTML =
                "☀️ Light Mode";

        }

        // ========================================
        // INIT
        // ========================================

        startScanner();

        renderRecentAttendance();

    </script>

</body>

</html>
